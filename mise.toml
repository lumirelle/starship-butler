experimental_monorepo_root = true

[settings]
npm.package_manager = "aube"

[env]
_.path = [ "./node_modules/.bin" ]

[tools]
bun = "latest"
aube = "latest"

[monorepo]
config_roots = [
  "docs/",
  "packages/*",
  "playground/"
]

[tasks.prepare]
run = "mise generate git-pre-commit --write"

[tasks.pre-commit]
run = "nano-staged"

[tasks.dev]
run = "aubr dev"

[tasks.count-vscode-extensions]
run = "aubr count-vscode-extensions"

[tasks.build]
run = "aubr build"

[tasks.start]
run = "aubr start --"

[tasks."docs:dev"]
run = "aubr docs:dev --"

[tasks."docs:build"]
run = "aubr docs:build --"

[tasks."docs:start"]
run = "aubr docs:start --"

[tasks.play]
depends = ":build"
run = "aubr play"

[tasks."lint:oxlint"]
run = "aubr lint:oxlint"

[tasks."lint:eslint"]
wait_for = ":lint:oxlint"
run = "aubr lint:eslint"

[tasks.lint]
depends = [
  ":lint:oxlint",
  ":lint:eslint"
]

[tasks."lint:fix:oxlint"]
run = "aubr lint:fix:oxlint"

[tasks."lint:fix:eslint"]
wait_for = ":lint:fix:oxlint"
run = "aubr lint:fix:eslint"

[tasks."lint:fix"]
depends = [
  ":lint:fix:oxlint",
  ":lint:fix:eslint"
]

[tasks.typecheck]
depends = ":build"
run = "aubr typecheck"

[tasks.unused]
run = "aubr unused"

[tasks.check]
depends = [
  ":typecheck",
  ":lint",
  ":unused"
]

[tasks."test:watch"]
depends = ":build"
run = "aubr test:watch"

[tasks.test]
depends = ":build"
run = "aubr test"

[tasks.prerelease]
depends = [
  ":check",
  ":test"
]

[tasks.release]
depends = ":prerelease"
# See https://github.com/oven-sh/bun/issues/18906 and https://github.com/oven-sh/bun/issues/20477
run = "aubr release --execute 'bun ./scripts/update-lockfile.sh'"
raw = true
